<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="./css/responsividade.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
   <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400..900&family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <title>Frontend Mentor | Order summary card</title>
</head>
<body>

<main>
  <section class="card-container">
    <img class = "logo" src="./images/illustration-hero.svg" alt="logo person listening to music">
    <h2>Order Summary</h2>

    <p>You can now listen to millions of songs, audiobooks, and podcasts on any device anywhere you like!</p>

    <div class="plan-selection">
      <img src="./images/icon-music.svg" alt="music icon">
      
      <div class="plan-details">
        <h3>Annual Plan</h3>
        <p>$59.99/year</p>
      </div>

      <a href="#">Change</a>
    </div>

    <button class="btn-primary">Proceed to Payment</button>
    <button class="btn-ghost">Cancel Order</button>
  </section>

  
<div class="attribution">
  Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
  Coded by <a href="#">Felipe Gomes da silva</a>.
</div>
</main>
</body>
</html>
